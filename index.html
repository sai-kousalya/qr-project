<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Phishing Detection System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh;
      margin: 0;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }
    
    /* Animated Blue Mesh Background for Home */
    .hero-gradient {
      background-color: #020617;
      background-image: 
        radial-gradient(at 0% 0%, hsla(222, 47%, 11%, 1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(217, 91%, 35%, 1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(199, 89%, 48%, 1) 0, transparent 50%), 
        radial-gradient(at 0% 100%, hsla(217, 91%, 35%, 1) 0, transparent 50%), 
        radial-gradient(at 50% 100%, hsla(222, 47%, 11%, 1) 0, transparent 50%), 
        radial-gradient(at 100% 100%, hsla(199, 89%, 48%, 1) 0, transparent 50%);
      background-size: 200% 200%;
      animation: gradientMove 15s ease infinite;
      position: relative;
      overflow: hidden;
    }

    /* Subtle texture overlay */
    .hero-gradient::before, .app-gradient::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
      opacity: 0.05;
      pointer-events: none;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* New Deep Blue Background for Internal Pages */
    .app-gradient {
      background-color: #020617;
      background-image: 
        radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), 
        radial-gradient(at 100% 0%, #312e81 0, transparent 50%), 
        radial-gradient(at 100% 100%, #1e293b 0, transparent 50%), 
        radial-gradient(at 0% 100%, #0f172a 0, transparent 50%);
      position: relative;
      overflow: hidden;
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",

}
</script>

</head>
<body class="text-slate-900 overflow-x-hidden">
  <div id="root"></div>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
